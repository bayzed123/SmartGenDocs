name: Docs Resource Home Builder

on:
  push:
    branches:
      - main
    paths:
      - "docs/**/*.html"

  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

concurrency:
  group: docs-home-builder
  cancel-in-progress: false

jobs:
  build-home:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate SmartGen Home Page
        run: |
          python << 'EOF'
import os
import re
from html.parser import HTMLParser

DOCS_DIR = "docs"
OUTPUT_FILE = "docs/Smartgen/home.html"

class TitleParser(HTMLParser):
    def __init__(self):
        super().__init__()
        self.in_title = False
        self.title = ""

    def handle_starttag(self, tag, attrs):
        if tag == "title":
            self.in_title = True

    def handle_endtag(self, tag):
        if tag == "title":
            self.in_title = False

    def handle_data(self, data):
        if self.in_title:
            self.title += data

resources = []

# Scan docs folder
for root, dirs, files in os.walk(DOCS_DIR):
    dirs[:] = [d for d in dirs if d != "Smartgen"]

    for file in files:
        if file.endswith(".html"):
            path = os.path.join(root, file)

            # Skip generated file
            if "Smartgen/home.html" in path.replace("\\", "/"):
                continue

            with open(path, "r", encoding="utf-8") as f:
                content = f.read()

            parser = TitleParser()
            parser.feed(content)

            title = parser.title.strip() or file.replace(".html", "")

            relative_path = path.replace("\\", "/").replace("docs/", "/docs/")

            resources.append({
                "title": title,
                "path": relative_path
            })

# Build HTML Home Page
cards = ""
for item in sorted(resources, key=lambda x: x["title"].lower()):
    cards += f'''
    <div style="padding:12px;margin:10px;border:1px solid #ddd;border-radius:8px;">
        <a href="{item['path']}" style="text-decoration:none;font-size:16px;">
            {item['title']}
        </a>
    </div>
    '''

html_output = f'''<!DOCTYPE html>
<html>
<head>
    <title>SmartGen Docs Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Open Graph -->
    <meta property="og:title" content="SmartGen Docs Home">
    <meta property="og:description" content="Auto generated documentation portal">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="SmartGen Docs Home">

    <style>
        body {{
            font-family: Arial;
            background: #f8f9fa;
            padding: 20px;
        }}
        .container {{
            max-width: 900px;
            margin: auto;
        }}
        h1 {{
            text-align: center;
        }}
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 SmartGen Docs Resources</h1>
        {cards}
    </div>
</body>
</html>
'''

os.makedirs(os.path.dirname(OUTPUT_FILE), exist_ok=True)

with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
    f.write(html_output)

print(f"Generated: {OUTPUT_FILE} with {len(resources)} pages")
EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add docs/Smartgen/home.html

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "auto: update SmartGen docs home resource page"
          git push